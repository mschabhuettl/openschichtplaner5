name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# All jobs run on push and PR to main/develop.

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (Python lint)
        run: ruff check backend/ --output-format=github

  lint-frontend:
    name: Lint Frontend (ESLint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint (TypeScript lint)
        working-directory: frontend
        run: npm run lint

      - name: Build frontend (TypeScript check + bundle)
        working-directory: frontend
        run: npm run build

  backend-tests:
    name: Backend Tests (pytest --cov)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          python -m pytest tests/ \
            --cov=sp5lib \
            --cov=api \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies (pip-audit)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip-audit --ignore-vuln CVE-2026-4539  # pygments (dev-only, via pytest)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm dependencies (npm audit)
        working-directory: frontend
        # --audit-level=critical: only fail on critical vulnerabilities
        run: npm audit --audit-level=critical

  frontend-tests:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm test -- --reporter=verbose --coverage --coverage.provider=v8 --coverage.reporter=lcov --coverage.reporter=text

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check for TypeScript errors
        working-directory: frontend
        run: npx tsc --noEmit

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-frontend, backend-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        working-directory: backend
        run: |
          # Copy fixture DBFs to a temp data dir for E2E
          mkdir -p /tmp/sp5-e2e-data
          cp tests/fixtures/*.DBF /tmp/sp5-e2e-data/
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health >/dev/null 2>&1 && break
            sleep 1
          done
        env:
          SP5_DEV_MODE: "1"
          SP5_DB_PATH: "/tmp/sp5-e2e-data"

      - name: Start frontend preview
        working-directory: frontend
        run: |
          npx vite preview --port 5173 &
          # Wait for frontend to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:5173 >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --reporter=github
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: frontend/e2e/screenshots/

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/
