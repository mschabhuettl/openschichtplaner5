name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# All jobs run on push and PR to main/develop.

jobs:
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (Python lint)
        run: ruff check . --output-format=github

  lint-frontend:
    name: Lint Frontend (ESLint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint (TypeScript lint)
        working-directory: frontend
        run: npm run lint

      - name: Build frontend (TypeScript check + bundle)
        working-directory: frontend
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies (pip-audit)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip-audit --ignore-vuln CVE-2026-4539  # pygments (dev-only, via pytest)

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit npm dependencies (npm audit)
        working-directory: frontend
        # --audit-level=critical: only fail on critical vulnerabilities
        run: npm audit --audit-level=critical

  frontend-tests:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm test -- --reporter=verbose --coverage --coverage.provider=v8 --coverage.reporter=lcov --coverage.reporter=text

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check for TypeScript errors
        working-directory: frontend
        run: npx tsc --noEmit

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        working-directory: backend
        run: |
          # Copy fixture DBFs to a temp data dir for E2E
          mkdir -p /tmp/sp5-e2e-data
          cp fixtures/*.DBF /tmp/sp5-e2e-data/
          uvicorn sp5api.main:app --host 0.0.0.0 --port 8000 &
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health >/dev/null 2>&1 && break
            sleep 1
          done
        env:
          SP5_DEV_MODE: "1"
          SP5_DB_PATH: "/tmp/sp5-e2e-data"
          SP5_BACKEND_DIR: ${{ github.workspace }}/backend

      - name: Start frontend preview
        working-directory: frontend
        run: |
          npx vite preview --port 5173 &
          # Wait for frontend to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:5173 >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --reporter=github
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Upload test screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-screenshots
          path: frontend/e2e/screenshots/

      - name: Upload test traces
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/

  e2e-cycle8-regressions:
    # Real-login E2E against a PRODUCTION-mode backend over a NON-localhost HTTP
    # origin (sp5.local) — the configuration the cycle-4/5 verifications never
    # exercised (they used dev-mode + localStorage on localhost), which is why the
    # Secure-cookie-over-HTTP login failure, the sidebar overflow and the broken
    # dark-mode toggle all slipped through. Each test goes red if its fix is reverted.
    name: E2E Cycle-8 Regressions (real login, prod, non-localhost)
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Install emoji font (needed to reproduce the sidebar overflow)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-color-emoji

      - name: Add non-localhost host alias
        run: echo "127.0.0.1 sp5.local" | sudo tee -a /etc/hosts

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start production-mode backend (serves SPA + /api, demo users seeded)
        working-directory: backend
        run: |
          mkdir -p /tmp/sp5-c8-data
          cp fixtures/*.DBF /tmp/sp5-c8-data/
          uvicorn sp5api.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/health >/dev/null 2>&1 && break
            sleep 1
          done
        env:
          # PROD mode on purpose: SP5_DEV_MODE is NOT set → real login + Secure-cookie logic.
          SP5_SEED_DEMO_USERS: "1"
          SP5_DB_PATH: "/tmp/sp5-c8-data"
          SP5_BACKEND_DIR: ${{ github.workspace }}/backend
          SP5_FRONTEND_DIST: ${{ github.workspace }}/frontend/dist
          SECRET_KEY: "ci-cycle8-secret-not-for-production"
          # The suite logs in for real once per test; lift the 5/min login limit so
          # the real-login flow (and any retry) never trips the brute-force guard.
          RATE_LIMIT_LOGIN: "100/minute"

      - name: Run cycle-8 regression suite over sp5.local (HTTP, non-localhost)
        working-directory: frontend
        run: npx playwright test --config=playwright.cycle8.config.ts --reporter=github
        env:
          CI: true
          E2E_BASE_URL: "http://sp5.local:8000"

      - name: Upload cycle-8 report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-cycle8-report
          path: frontend/playwright-report/
