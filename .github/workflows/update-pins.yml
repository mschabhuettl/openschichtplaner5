name: Update PyPI Pins

# Zieht die PyPI-Pins (LIB_SOURCE/API_SOURCE) in Dockerfile und den
# docker-compose-Dateien auf die jeweils neueste veröffentlichte Version
# nach und committet direkt auf main. Ohne Versionsänderung passiert nichts.
# Die >=-Untergrenzen in backend/requirements.txt bleiben bewusst unberührt.
#
# Mit den optionalen Inputs expected_lib/expected_api wartet der Workflow,
# bis PyPI mindestens diese Versionen meldet — direkt nach einem Release kann
# der JSON-Endpunkt wegen CDN-Propagation noch die Vorgängerversion liefern.

on:
  schedule:
    - cron: '0 2 * * *'  # Täglich 02:00 UTC — montags weiterhin vor dem wöchentlichen Image-Rebuild (docker.yml, 03:00)
  workflow_dispatch:
    inputs:
      expected_lib:
        description: 'Mindestversion von libopenschichtplaner5 — wartet auf PyPI-CDN-Propagation (optional)'
        type: string
        required: false
        default: ''
      expected_api:
        description: 'Mindestversion von openschichtplaner5-api — wartet auf PyPI-CDN-Propagation (optional)'
        type: string
        required: false
        default: ''
  # Vorbereitete Kopplung: kann nach einem Library-/API-Release per
  # repository_dispatch (event_type update-pins) angestoßen werden;
  # expected_lib/expected_api werden dann aus dem client_payload gelesen.
  repository_dispatch:
    types: [update-pins]

permissions:
  contents: write

jobs:
  update-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Neueste PyPI-Versionen ermitteln und Pins nachziehen
        env:
          EXPECTED_LIB: ${{ inputs.expected_lib || github.event.client_payload.expected_lib || '' }}
          EXPECTED_API: ${{ inputs.expected_api || github.event.client_payload.expected_api || '' }}
        run: |
          set -euo pipefail
          version_ge() {  # $1 >= $2 ?
            [[ "$(printf '%s\n' "$2" "$1" | sort -V | head -1)" == "$2" ]]
          }
          # PyPI-CDN-Lag: nach einem Release liefert der JSON-Endpunkt u. U.
          # noch die alte Version — mit expected_lib/expected_api bis ~3 Min
          # (15-s-Schritte) warten, bis mindestens die erwarteten Versionen
          # gemeldet werden.
          for attempt in $(seq 1 12); do
            LIB_VER=$(curl -fsSL https://pypi.org/pypi/libopenschichtplaner5/json | jq -r .info.version)
            API_VER=$(curl -fsSL https://pypi.org/pypi/openschichtplaner5-api/json | jq -r .info.version)
            STALE=""
            if [[ -n "${EXPECTED_LIB}" ]] && ! version_ge "${LIB_VER}" "${EXPECTED_LIB}"; then
              STALE="libopenschichtplaner5 ${LIB_VER} < ${EXPECTED_LIB}"
            fi
            if [[ -n "${EXPECTED_API}" ]] && ! version_ge "${API_VER}" "${EXPECTED_API}"; then
              STALE="${STALE:+${STALE}, }openschichtplaner5-api ${API_VER} < ${EXPECTED_API}"
            fi
            if [[ -z "${STALE}" ]]; then
              break
            fi
            echo "PyPI noch nicht aktuell (${STALE}) — warte 15 s (Versuch ${attempt}/12) ..."
            sleep 15
          done
          if [[ -n "${STALE}" ]]; then
            echo "::error::PyPI liefert nach ~3 Minuten weiterhin veraltete Versionen (${STALE}) — CDN-Propagation abwarten und erneut starten."
            exit 1
          fi
          echo "PyPI: libopenschichtplaner5 ${LIB_VER}, openschichtplaner5-api ${API_VER}"
          if ! [[ "${LIB_VER}" =~ ^[0-9] && "${API_VER}" =~ ^[0-9] ]]; then
            echo "::error::PyPI-Versionsabfrage lieferte keine gültigen Versionen"
            exit 1
          fi
          sed -i -E "s/libopenschichtplaner5\[postgres\]==[0-9][0-9A-Za-z.]*/libopenschichtplaner5[postgres]==${LIB_VER}/g" \
            Dockerfile docker-compose*.yml
          sed -i -E "s/openschichtplaner5-api==[0-9][0-9A-Za-z.]*/openschichtplaner5-api==${API_VER}/g" \
            Dockerfile docker-compose*.yml
          echo "LIB_VER=${LIB_VER}" >> "$GITHUB_ENV"
          echo "API_VER=${API_VER}" >> "$GITHUB_ENV"

      - name: Änderungen committen und pushen
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Pins bereits aktuell — nichts zu tun."
            exit 0
          fi
          git config user.name "Matthias Schabhüttl"
          git config user.email "matthias@matthiasschabhuettl.com"
          git commit -am "build(docker): PyPI-Pins nachgezogen (libopenschichtplaner5 ${LIB_VER}, openschichtplaner5-api ${API_VER})"
          git push
