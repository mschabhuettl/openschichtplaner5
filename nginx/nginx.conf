# ==============================================================================
# OpenSchichtplaner5 — nginx Production Configuration
#
# Features:
#   - HTTPS-ready (Let's Encrypt / Certbot)
#   - Security headers
#   - Gzip compression
#   - Static file caching
#   - Reverse proxy to backend (uvicorn)
#   - SSE support (Server-Sent Events)
# ==============================================================================

# ---------- Upstream: Backend API ----------
upstream sp5_backend {
    server sp5:8000;
}

# ---------- HTTP → HTTPS redirect (when SSL is enabled) ----------
# Uncomment this block after obtaining SSL certificates:
# server {
#     listen 80;
#     server_name _;
#
#     # Let's Encrypt ACME challenge
#     location /.well-known/acme-challenge/ {
#         root /var/www/certbot;
#     }
#
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }

# ---------- Main server block ----------
server {
    # --- HTTP mode (default, works without SSL) ---
    listen 80;
    server_name _;

    # --- HTTPS mode ---
    # Uncomment these lines and comment out the HTTP listen above
    # after obtaining SSL certificates:
    # listen 443 ssl http2;
    # server_name meine-domain.de;
    #
    # ssl_certificate     /etc/letsencrypt/live/meine-domain.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/meine-domain.de/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_session_tickets off;
    #
    # # OCSP Stapling
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/letsencrypt/live/meine-domain.de/chain.pem;

    # --- Security Headers ---
    add_header X-Frame-Options           "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options    "nosniff"                               always;
    add_header X-XSS-Protection          "1; mode=block"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"       always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    # Uncomment after enabling HTTPS:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; frame-ancestors 'none';" always;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # --- Request limits ---
    client_max_body_size 10m;

    # --- Static files (frontend) ---
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively (JS, CSS, images with hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- API proxy to backend ---
    location /api/ {
        proxy_pass         http://sp5_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_buffering    on;
    }

    # --- SSE (Server-Sent Events) — no buffering ---
    location /api/v1/events {
        proxy_pass              http://sp5_backend;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      3600s;
        proxy_buffering         off;
        proxy_cache             off;
        chunked_transfer_encoding on;
    }

    # --- SPA fallback: serve index.html for client-side routing ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Let's Encrypt ACME challenge (HTTP mode) ---
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- Deny dotfiles ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
