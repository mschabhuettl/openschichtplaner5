name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'  # Jeden Montag 04:00 UTC — wöchentliche Code-Analyse

jobs:
  analyze:
    name: Analyse (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: CodeQL initialisieren
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyse durchführen
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
