# nginx-Konfiguration für docker-compose.stack.yml (Stage "frontend-static"):
# served die gebaute SPA und proxied /api an den Service "api"
# (openschichtplaner5-api aus dem Geschwister-Repo).

upstream sp5_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/json application/javascript image/svg+xml;

    client_max_body_size 10m;

    root /usr/share/nginx/html;
    index index.html;

    # Gehashte Assets aggressiv cachen
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SSE (Server-Sent Events) — ungepuffert, langer Timeout
    location /api/v1/events {
        proxy_pass              http://sp5_api;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      3600s;
        proxy_buffering         off;
        proxy_cache             off;
        chunked_transfer_encoding on;
    }

    # API-Proxy
    location /api/ {
        proxy_pass         http://sp5_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # SPA-Fallback für Client-Side-Routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
