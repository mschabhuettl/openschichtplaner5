services:

  # ----------------------------------------------------------------------------
  # sp5 — Hauptanwendung (Backend + eingebettetes Frontend)
  # ----------------------------------------------------------------------------
  sp5:
    build:
      context: .
      args:
        # lib/api kommen aus Git-main (die aktuellen Versionen sind nicht auf
        # PyPI) — per .env/Umgebung überschreibbar, z.B. auf einen Tag oder
        # später einen PyPI-Stand.
        LIB_SOURCE: ${LIB_SOURCE:-libopenschichtplaner5[postgres]==1.14.0}
        API_SOURCE: ${API_SOURCE:-openschichtplaner5-api==1.8.0}
    ports:
      - "8000:8000"
    volumes:
      # Persistenter Named-Volume für Datenbankdaten (SP5_DB_PATH=/app/data,
      # Default aus dem Image — DBF-Dateien liegen im Volume-Root)
      - sp5_data:/app/data
      # Logs auf dem Host einsehbar (optional: auskommentieren)
      - ./logs:/app/logs
      # Mutabler Laufzeit-State unter SP5_BACKEND_DIR — das Root-FS ist
      # read_only, diese Volumes bleiben beschreibbar (JSON-Stores,
      # Foto-Uploads, Auto-Migrate-Backups)
      - sp5_state:/app/backend/data
      - sp5_api_state:/app/backend/api
      - sp5_backups:/app/backend/backups
    env_file:
      - .env
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# ------------------------------------------------------------------------------
# Volumes
# ------------------------------------------------------------------------------
volumes:
  sp5_data:
    driver: local
  sp5_state:
    driver: local
  sp5_api_state:
    driver: local
  sp5_backups:
    driver: local
